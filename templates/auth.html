<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quevra Auth.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        /* .brand-serif { font-family: Georgia, serif; } */

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fadeInUp 0.6s ease-out; }

        .input-field { transition: all 0.3s ease; }
        .input-field:focus {
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            transform: translateY(-2px);
        }

        .tab-btn { position: relative; transition: all 0.3s ease; }
        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 0;
            width: 0; height: 2px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            transition: width 0.3s ease;
        }
        .tab-btn.active::after { width: 100%; }

        .icon-box {
            width: 54px; height: 54px;
            border-radius: 14px;
            display: inline-flex; align-items: center; justify-content: center;
            background: #4F46E5;
            margin-bottom: 10px;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden max-w-md w-full border border-gray-100 animate-fade-in-up">
        <div class="pt-12 pb-8 px-8 text-center">
            <div class="icon-box shadow-lg shadow-indigo-500/20">
                <svg width="34" height="34" viewBox="0 0 34 34">
                    <circle cx="17" cy="17" r="12" fill="none" stroke="white" stroke-width="2.5"></circle>
                    <circle cx="17" cy="17" r="8" fill="none" stroke="white" stroke-width="1.2" opacity="0.4"></circle>
                    <path d="M26 22 A12 12 0 0 1 29 17" fill="none" stroke="#4F46E5" stroke-width="3.5"></path>
                    <line x1="24" y1="24" x2="30" y2="30" stroke="white" stroke-width="2.5" stroke-linecap="round"></line>
                    <circle cx="17" cy="17" r="3" fill="white"></circle>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-gray-900 brand-serif">Quevra</h1>
            <p class="text-[10px] uppercase tracking-[4px] text-indigo-600 font-bold mt-1">Learn without limits</p>
        </div>

        <div class="p-8">
            <div class="flex gap-3 mb-8 border-b border-gray-200 pb-4 justify-center">
                <button onclick="switchTab('login')" id="loginTab" class="tab-btn active py-2 px-4 font-semibold text-gray-900 transition relative">
                    <span class="flex items-center gap-2"><i class="fas fa-sign-in-alt"></i>Login</span>
                </button>
                <button onclick="switchTab('signup')" id="signupTab" class="tab-btn py-2 px-4 font-semibold text-gray-500 hover:text-gray-700 transition relative">
                    <span class="flex items-center gap-2"><i class="fas fa-user-plus"></i>Sign Up</span>
                </button>
            </div>

            <div id="errorMessage" class="hidden mb-4 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 rounded-lg flex items-center gap-2 animate-fade-in-up">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>

            <div id="loginForm">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-800 mb-2">Email Address</label>
                        <div class="relative">
                            <i class="fas fa-envelope absolute left-4 top-1/2 transform -translate-y-1/2 text-blue-400 text-sm"></i>
                            <input type="email" id="loginEmail" class="input-field w-full pl-11 pr-4 py-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none bg-gray-50" placeholder="your@email.com">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-800 mb-2">Password</label>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-blue-400 text-sm"></i>
                            <input type="password" id="loginPassword" class="input-field w-full pl-11 pr-4 py-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none bg-gray-50" placeholder="••••••••">
                        </div>
                    </div>
                    <button onclick="handleLogin()" class="w-full bg-gradient-to-r from-indigo-600 to-blue-700 text-white py-3 rounded-lg font-semibold hover:shadow-lg hover:-translate-y-0.5 transition duration-200 mt-6">
                        Sign In
                    </button>
                </div>
            </div>

            <div id="signupForm" class="hidden">
                <div class="space-y-4 max-h-[400px] overflow-y-auto px-1">
                    <div>
                        <label class="block text-sm font-semibold text-gray-800 mb-2">Full Name</label>
                        <input type="text" id="signupName" class="input-field w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 outline-none bg-gray-50" placeholder="John Doe">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-800 mb-2">Email Address</label>
                        <input type="email" id="signupEmail" class="input-field w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 outline-none bg-gray-50" placeholder="your@email.com">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-800 mb-2">Password</label>
                        <input type="password" id="signupPassword" class="input-field w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 outline-none bg-gray-50" placeholder="••••••••">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-800 mb-2">Grade Level</label>
                        <select id="signupLevel" onchange="updateSubjects()" class="input-field w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 outline-none bg-gray-50">
                            <option value="">Select your grade</option>
                            <optgroup label="Junior Secondary">
                                <option value="JSS1">JSS 1</option>
                                <option value="JSS2">JSS 2</option>
                                <option value="JSS3">JSS 3</option>
                            </optgroup>
                            <optgroup label="Senior Secondary">
                                <option value="SSS1">SSS 1</option>
                                <option value="SSS2">SSS 2</option>
                                <option value="SSS3">SSS 3</option>
                            </optgroup>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-800 mb-3">Choose Your Subjects</label>
                        <div id="subjectsPlaceholder" class="text-xs text-gray-400 italic">Select grade first</div>
                        <div class="grid grid-cols-2 gap-2 hidden" id="subjectsGrid"></div>
                    </div>
                    <button onclick="handleSignup()" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition mt-4">
                        Create Account
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedSubjects = [];
        const JSS_SUBJECTS = [{ name: 'Mathematics', icon: 'fa-calculator' }, { name: 'English Language', icon: 'fa-book-open' }, { name: 'Basic Science', icon: 'fa-flask' }];
        const SSS_SUBJECTS = [{ name: 'Mathematics', icon: 'fa-calculator' }, { name: 'Physics', icon: 'fa-atom' }, { name: 'Chemistry', icon: 'fa-flask' }, { name: 'Biology', icon: 'fa-leaf' }];

        function updateSubjects() {
            const level = document.getElementById('signupLevel').value;
            const grid = document.getElementById('subjectsGrid');
            const placeholder = document.getElementById('subjectsPlaceholder');
            grid.innerHTML = '';
            if (!level) { grid.classList.add('hidden'); placeholder.classList.remove('hidden'); return; }
            placeholder.classList.add('hidden'); grid.classList.remove('hidden');
            const subjects = level.startsWith('JSS') ? JSS_SUBJECTS : SSS_SUBJECTS;
            subjects.forEach(subject => {
                const btn = document.createElement('button');
                btn.className = 'py-2 px-3 rounded-lg text-xs font-medium bg-gray-100 text-gray-700 border-2 border-transparent';
                btn.innerHTML = `<i class="fas ${subject.icon} mr-1"></i>${subject.name}`;
                btn.onclick = () => {
                    if (selectedSubjects.includes(subject.name)) {
                        selectedSubjects = selectedSubjects.filter(s => s !== subject.name);
                        btn.classList.remove('bg-indigo-600', 'text-white');
                    } else {
                        selectedSubjects.push(subject.name);
                        btn.classList.add('bg-indigo-600', 'text-white');
                    }
                };
                grid.appendChild(btn);
            });
        }

        function switchTab(tab) {
            document.getElementById('loginForm').classList.toggle('hidden', tab === 'signup');
            document.getElementById('signupForm').classList.toggle('hidden', tab === 'login');
            document.getElementById('loginTab').classList.toggle('active', tab === 'login');
            document.getElementById('signupTab').classList.toggle('active', tab === 'signup');
        }

        async function handleLogin() { window.location.href = '/dashboard'; }
        async function handleSignup() { window.location.href = '/dashboard'; }
    </script>
</body>
</html>
